name: Update WC2026 scorers

# 美西夏令时 (PDT = UTC-7)：11:00–21:00 每 10 分钟更新一次。
# GitHub cron 用 UTC，故拆成两段 + 收尾：
#   美西 11:00–16:59  ->  UTC 18:00–23:59
#   美西 17:00–20:59  ->  UTC 00:00–03:59 (次日)
#   美西 21:00 整      ->  UTC 04:00 收尾一次
on:
  schedule:
    - cron: "*/10 18-23 * * *"
    - cron: "*/10 0-3 * * *"
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch latest goals
        run: python update_data.py
      - name: Commit if changed
        run: |
          git config user.name  "wc-bot"
          git config user.email "wc-bot@users.noreply.github.com"
          git add data.json club_overrides.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: auto update $(date -u +%FT%TZ)"
            git push
          fi
