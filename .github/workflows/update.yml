name: Update WC2026 scorers

# 比赛日时段每 30 分钟抓取一次。
# 窗口：美西夏令时 09:00–23:00 (PDT = UTC-7) → UTC 16:00–06:00(次日)
#   UTC 16:00–23:30
#   UTC 00:00–06:00 (次日)
on:
  schedule:
    - cron: "*/30 16-23 * * *"
    - cron: "*/30 0-6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch latest goals
        run: python update_data.py
      - name: Commit if changed
        run: |
          git config user.name  "wc-bot"
          git config user.email "wc-bot@users.noreply.github.com"
          git add data.json club_overrides.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "data: auto update $(date -u +%FT%TZ)"
            git push
          fi
