name: Check league id
on: { workflow_dispatch: {} }
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - env:
          APISPORTS_KEY: ${{ secrets.APISPORTS_KEY }}
        run: python check_id.py
